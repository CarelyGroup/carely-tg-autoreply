name: Keep Render Awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        run: |
          curl --fail --show-error --silent --max-time 20 --retry 2 https://carely-tg-autoreply.onrender.com/
